<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Support us — Sibility</title>
  <meta name="description" content="Your gift backs grants, courses and research. Give once or every month — every amount goes to the work." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;500;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/site.css" />
</head>
<body data-page="">

  <header id="site-header"></header>

  <!-- HERO -->
  <section style="padding: clamp(64px, 9vw, 150px) var(--gutter) clamp(40px, 6vw, 72px);">
    <div style="max-width: 760px;">
      <div class="section-eyebrow">Support Sibility</div>
      <h1 style="font-family: var(--sans); font-size: clamp(46px, 6.6vw, 96px); font-weight: 700; letter-spacing: -0.03em; line-height: 0.97; margin: 0;">Become part of the work.</h1>
      <p style="font-size: clamp(18px, 1.7vw, 22px); line-height: 1.55; color: var(--body); margin: 30px 0 0; max-width: 560px;">Sibility is independent, and stays that way because people who believe in nonviolence choose to fund it. Every contribution goes straight to grants, courses and research — not overhead for its own sake.</p>
    </div>
  </section>

  <!-- DONATE BAND (opens the giving modal) -->
  <section style="padding: 0 var(--gutter) clamp(56px, 7vw, 96px);">
    <div id="donate-block"></div>
  </section>

  <!-- NEWSLETTER -->
  <section style="padding: 0 var(--gutter);">
    <div id="newsletter-block"></div>
  </section>

  <footer id="site-footer"></footer>

  <script src="js/chrome.js"></script>
  <script src="js/donate.js"></script>
  <script src="js/newsletter.js"></script>
</body>
</html>
