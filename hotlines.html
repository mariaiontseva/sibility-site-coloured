<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hotlines — Sibility</title>
  <meta name="description" content="Free, confidential phone lines. Filter by country and city — many lines are nationwide and answer in several languages." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;500;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/site.css" />
</head>
<body data-page="hotlines">

  <header id="site-header"></header>

  <!-- HERO -->
  <section class="dir-hero">
    <div class="dir-ghost">hotlines</div>
    <div class="dir-hero-inner">
      <div class="eyebrow" style="margin-bottom: 28px;">Get help now</div>
      <h1>Hotlines</h1>
      <p>Free, confidential phone lines. Filter by country and city — many lines are nationwide and answer in several languages.</p>
    </div>
  </section>

  <!-- EMERGENCY STRIP -->
  <section class="dir-emergency-wrap">
    <div class="dir-emergency">
      <span class="lead">In immediate danger?</span>
      <span class="rest">Call your local emergency number first — 112 across Europe.</span>
    </div>
  </section>

  <!-- DIRECTORY -->
  <section class="dir-wrap">
    <div id="directory"></div>
  </section>

  <!-- SHARED TAIL -->
  <section style="max-width: 1240px; margin: 0 auto; padding: 0 var(--gutter);">
    <div id="donate-block"></div>
    <div id="newsletter-block"></div>
  </section>

  <footer id="site-footer"></footer>

  <script src="js/chrome.js"></script>
  <script src="js/directory.js"></script>
  <script src="js/donate.js"></script>
  <script src="js/newsletter.js"></script>
</body>
</html>
