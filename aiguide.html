<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ask Sibility — where do I start?</title>
  <meta name="description" content="A couple of questions — then a place to start. Ask Sibility helps you find one small nonviolence action that fits your life." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;500;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/site.css" />
</head>
<body data-page="">

  <header id="site-header"></header>

  <section style="padding: clamp(64px, 9vw, 150px) var(--gutter) clamp(72px, 10vw, 128px);">
    <div style="max-width: 720px;">
      <div class="section-eyebrow">Ask Sibility</div>
      <h1 style="font-family: var(--sans); font-size: clamp(46px, 6.6vw, 96px); font-weight: 700; letter-spacing: -0.03em; line-height: 0.97; margin: 0;">Where do I start?</h1>
      <p style="font-size: clamp(18px, 1.7vw, 22px); line-height: 1.55; color: var(--body); margin: 30px 0 0; max-width: 560px;">A couple of questions — then a place to start. Tell the guide how much time you have and what pulls at you, and it will point you to one small, real action toward a less violent world.</p>
      <button type="button" id="aig-launch-page" class="btn-solid" style="margin-top: 34px;">Talk to the guide <span class="arw">&rarr;</span></button>
    </div>
  </section>

  <footer id="site-footer"></footer>

  <script src="js/chrome.js"></script>
  <script>
    (function () {
      function openGuide() { if (window.__sibilityAI && window.__sibilityAI.open) { window.__sibilityAI.open(); return true; } return false; }
      document.getElementById('aig-launch-page').addEventListener('click', function () {
        if (!openGuide()) { var t = setInterval(function () { if (openGuide()) clearInterval(t); }, 120); }
      });
      // no auto-open — the guide opens only on tap (or a ?q deep-link)
    })();
  </script>
</body>
</html>
